name: build

# 触发条件
on:
  push:
    branches:
      - master    # 当代码推送到 master 分支时触发
    tags:
      - v* # 当推送以 v 开头的标签（如 v1.0.0）时触发
  pull_request:
    branches:
      - master    # 当有针对 master 的 PR 时触发

# 赋予 CI 写入权限（用于自动创建 Release 和上传 Changelog）
permissions:
  contents: write

jobs:
  build-rust:
    strategy:
      matrix:
        platform: [ubuntu-latest] # 使用 GitHub 提供的最新版 Ubuntu 虚拟机
    runs-on: ${{ matrix.platform }}

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # 获取完整历史，这对 git-cliff 生成日志至关重要
          submodules: recursive  # 如果项目有子模块，递归获取

      # 2. 安装系统依赖 (解决大部分编译报错的根源)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev # 大多数 Rust 项目需要的 C 库

      # 3. 安装 Rust 工具链
      - name: Install Rust
        run: |
          rustup toolchain install stable --component llvm-tools-preview
          rustup default stable

      # 4. 快速安装工具 (使用 taiki-e 的 action，比手动 cargo install 快得多)
      - name: Install helper tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest,git-cliff # 一次性安装所有需要的工具

      # 5. 设置 Rust 缓存 (大幅缩短后续构建时间)
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # 6. 代码格式检查 (规范第一步)
      - name: Check code format
        run: cargo fmt -- --check

      # 7. 静态检查 (找出潜在的 Bug)
      - name: Check for errors
        run: cargo check --all

      # 8. 强力 Lint (将警告视为错误，保持代码洁癖)
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 9. 执行测试 (使用更快的 nextest)

      # - name: Execute rust tests
      #   run: cargo nextest run --all-features

      # 10. 生成 Changelog (仅在推送标签时运行)

      # - name: Generate a changelog
      #   if: startsWith(github.ref, 'refs/tags/')
      #   run: git-cliff --latest --strip header -o CHANGES.md

        # 注意：这里直接运行二进制命令，不走 Docker，避免环境冲突

      # 11. 自动发布 Release (仅在推送标签时运行)
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: CHANGES.md # 使用生成的 CHANGES.md 作为 Release 说明
